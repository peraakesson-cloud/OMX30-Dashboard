name: Morning Brief

on:
  schedule:
    - cron: '55 5 * * 1-5'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install packages
        run: pip install anthropic numpy pandas

      - name: Run morning brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/morning.py

      - name: Push data files
        run: |
          git config user.name  "OMX30 Bot"
          git config user.email "bot@omx30.local"
          git add data/scorecard.json data/morning_brief.json
          git diff --staged --quiet || git commit -m "Morning brief $(date +'%Y-%m-%d')"
          git push
